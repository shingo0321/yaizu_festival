<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>焼津祭 印刷用</title>
<style>
  @page { size: 297mm 210mm; margin: 5mm; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Hiragino Sans", "Segoe UI", sans-serif;
    color: #1a1a1a;
    font-size: 16px;
    line-height: 1.3;
  }
  .day-block {
    page-break-before: always;
    display: flex;
    flex-direction: column;
  }
  .day-block:first-child { page-break-before: auto; }
  .page-footer {
    margin-top: auto;
    padding-top: 8px;
    text-align: right;
    font-size: 11px;
    color: #999;
  }
  .day-block h2 {
    font-size: 18px;
    color: #0f4c81;
    border-bottom: 2px solid #0f4c81;
    padding-bottom: 4px;
    margin: 0 0 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: #e8eef5;
    font-size: 13px;
    padding: 2px 8px;
  }
  td {
    padding: 4px 8px;
  }
  tr:nth-child(even) td { background: #f7f9fb; }
  .col-time { width: 60px; }
  .col-place { width: 130px; }
  td.col-time { font-weight: bold; color: #0f4c81; }
  .title { white-space: pre-line; }
  .note { display: block; color: #777; font-weight: normal; font-size: 0.85em; }
</style>
</head>
<body>
  <div id="schedule"></div>

  <script src="data.js"></script>
  <script>
    // A4横(297x210mm)・余白10mm/12mm での1ページあたりの本文高さ(px)。
    // 96px/inch, 25.4mm/inch で換算し、印字ずれ対策の安全マージンを引く。
    const MM_TO_PX = 96 / 25.4;
    const PAGE_MARGIN_MM = 5;
    const PAGE_CONTENT_HEIGHT_PX = (210 - PAGE_MARGIN_MM * 2) * MM_TO_PX - 15;
    const CONTENT_WIDTH_PX = (297 - PAGE_MARGIN_MM * 2) * MM_TO_PX;

    function renderTitle(title) {
      return title
        .split("\n")
        .map((line, i) =>
          line.startsWith("※")
            ? `<span class="note">${line}</span>`
            : i === 0
            ? line
            : `<br>${line}`
        )
        .join("");
    }

    function rowHtml(item) {
      return `
        <tr>
          <td class="col-time">${item.time}</td>
          <td class="col-place">${item.place}</td>
          <td class="title">${renderTitle(item.title)}</td>
        </tr>
      `;
    }

    function dayBlockHtml(label, items, pageNum) {
      return `
        <div class="day-block" style="height: ${PAGE_CONTENT_HEIGHT_PX}px;">
          <h2>${label}</h2>
          <table>
            <thead>
              <tr>
                <th class="col-time">時間</th>
                <th class="col-place">場所</th>
                <th>やること</th>
              </tr>
            </thead>
            <tbody>${items.map(rowHtml).join("")}</tbody>
          </table>
          <div class="page-footer">${pageNum}</div>
        </div>
      `;
    }

    // 実際のテーブル行の高さを測るための非表示プローブ。印刷時の本文幅と揃える。
    function measureRowHeights(day) {
      const probe = document.createElement("div");
      probe.style.position = "absolute";
      probe.style.visibility = "hidden";
      probe.style.top = "0";
      probe.style.left = "0";
      probe.style.width = CONTENT_WIDTH_PX + "px";
      probe.innerHTML = dayBlockHtml(day.date, day.items, 1);
      document.body.appendChild(probe);

      const h2Top = probe.querySelector("h2").getBoundingClientRect().top;
      const theadBottom = probe.querySelector("thead").getBoundingClientRect().bottom;
      const headerBlockHeight = theadBottom - h2Top;
      const rowHeights = [...probe.querySelectorAll("tbody tr")].map(
        (r) => r.getBoundingClientRect().height
      );

      document.body.removeChild(probe);
      return { headerBlockHeight, rowHeights };
    }

    // 最大収容数で詰めた場合に何ページ必要かを求める(ページ数Nの決定用)
    function countPagesGreedy(rowHeights, available) {
      let pages = 1;
      let currentHeight = 0;
      rowHeights.forEach((h, i) => {
        if (currentHeight > 0 && currentHeight + h > available) {
          pages += 1;
          currentHeight = 0;
        }
        currentHeight += h;
      });
      return pages;
    }

    function chunkDay(day) {
      const { headerBlockHeight, rowHeights } = measureRowHeights(day);
      const available = PAGE_CONTENT_HEIGHT_PX - headerBlockHeight;
      const pageCount = countPagesGreedy(rowHeights, available);

      // 求めたページ数に、行の高さ合計が均等になるように分割する
      const totalHeight = rowHeights.reduce((a, h) => a + h, 0);
      const targetPerPage = totalHeight / pageCount;

      const chunks = [];
      let current = [];
      let currentHeight = 0;
      let remainingPages = pageCount;

      day.items.forEach((item, i) => {
        const h = rowHeights[i];
        const wouldExceedTarget = currentHeight > 0 && currentHeight + h > targetPerPage;
        const mustFlush = remainingPages > 1 && wouldExceedTarget;

        if (mustFlush) {
          chunks.push(current);
          current = [];
          currentHeight = 0;
          remainingPages -= 1;
        }
        current.push(item);
        currentHeight += h;
      });
      if (current.length) chunks.push(current);

      return chunks;
    }

    const dayChunks = FESTIVAL_DATA.schedule.map((day) => ({ day, chunks: chunkDay(day) }));

    let pageNum = 0;
    const html = dayChunks
      .map(({ day, chunks }) =>
        chunks
          .map((items, i) => {
            pageNum += 1;
            const label =
              chunks.length > 1 ? `${day.date}（${i + 1}/${chunks.length}）` : day.date;
            return dayBlockHtml(label, items, pageNum);
          })
          .join("")
      )
      .join("");

    document.getElementById("schedule").innerHTML = html;
  </script>
</body>
</html>
