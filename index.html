<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LIFFサンプル</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      box-sizing: border-box;
      min-height: 100vh;
    }
    h1 { font-size: 1.2rem; margin: 16px 0 8px; }
    #profile-pic {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
      margin-top: 16px;
    }
    #status {
      margin-top: 24px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 100%;
      box-sizing: border-box;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>LIFFサンプルアプリ</h1>
  <img id="profile-pic" alt="" />
  <div id="status">読み込み中...</div>

  <script>
    const LIFF_ID = "2010598438-IL4pnvpt"; // ← LINE Developersコンソールで発行したLIFF IDに書き換える

    async function main() {
      const statusEl = document.getElementById("status");
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        document.getElementById("profile-pic").src = profile.pictureUrl || "";
        statusEl.textContent =
          `こんにちは、${profile.displayName} さん！\nLIFFアプリの表示に成功しました。`;
      } catch (err) {
        statusEl.textContent = "エラーが発生しました: " + err.message;
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
