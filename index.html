<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>焼津祭</title>
  <meta property="og:title" content="焼津祭" />
  <meta property="og:description" content="開催日程・地図・役割はこちら" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gate-overlay" class="gate-overlay">
    <form id="gate-form" class="gate-form">
      <h1>焼津祭</h1>
      <p>パスワードを入力してください</p>
      <input type="password" id="gate-password" autocomplete="off" autofocus />
      <button type="submit">開く</button>
      <p id="gate-error" class="gate-error" hidden>パスワードが違います</p>
    </form>
  </div>

  <div id="site-content" hidden>
    <header class="hero">
      <h1 id="hero-title"></h1>
      <p id="hero-date"></p>
      <p id="hero-subtitle"></p>
    </header>

    <nav class="tabs">
      <button class="active" data-target="schedule-panel">開催日程</button>
      <button data-target="map-panel">地図</button>
      <button data-target="roles-panel">役割</button>
    </nav>

    <main>
      <section id="schedule-panel" class="panel active"></section>
      <section id="map-panel" class="panel"></section>
      <section id="roles-panel" class="panel"></section>
    </main>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <button id="lightbox-close" class="lightbox-close" aria-label="閉じる">×</button>
    <div id="lightbox-viewport" class="lightbox-viewport">
      <img id="lightbox-img" src="" alt="" />
    </div>
    <div class="lightbox-controls">
      <button id="lightbox-zoom-out" aria-label="縮小">－</button>
      <button id="lightbox-zoom-in" aria-label="拡大">＋</button>
    </div>
  </div>

  <script src="gate.js"></script>
</body>
</html>
